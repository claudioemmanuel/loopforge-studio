# ===========================================
# Loopforge Studio Docker Compose - Simple Setup
# ===========================================
# One-liner setup for open-source users:
#
#   git clone https://github.com/yourorg/loopforge
#   cd loopforge
#   cp .env.example .env
#   # Edit .env to add GITHUB_CLIENT_ID and GITHUB_CLIENT_SECRET
#   ./scripts/init-secrets.sh
#   docker compose up
#
# For development with hot reload, use docker-compose.dev.yml instead:
#   docker compose -f docker-compose.dev.yml up
#
# ===========================================

services:
  # ===========================================
  # PostgreSQL - Primary database
  # ===========================================
  postgres:
    image: postgres:16-alpine
    container_name: loopforge-studio-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: loopforge
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d loopforge"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - loopforge

  # ===========================================
  # Redis - Job queue backend
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: loopforge-studio-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - loopforge

  # ===========================================
  # Next.js Web Application
  # ===========================================
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: 1
    container_name: loopforge-studio-web
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/loopforge
      - REDIS_URL=redis://redis:6379
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - AUTH_TRUST_HOST=true
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - loopforge

  # ===========================================
  # BullMQ Worker - Task execution
  # ===========================================
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
      args:
        BUILDKIT_INLINE_CACHE: 1
    container_name: loopforge-studio-worker
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/loopforge
      - REDIS_URL=redis://redis:6379
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    volumes:
      - repos-data:/app/repos
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "--import",
          "tsx",
          "--eval",
          "import './workers/execution-worker.ts'",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - loopforge

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  repos-data:
    driver: local

networks:
  loopforge:
    driver: bridge
