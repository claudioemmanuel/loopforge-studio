<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>

    <!-- Left loop gradient: Cyan to Blue to Purple -->
    <linearGradient id="gradientLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="50%" stop-color="#0088CC"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>

    <!-- Right loop gradient: Purple to Orange to Yellow -->
    <linearGradient id="gradientRight" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="50%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>

    <!-- Anvil gradient: Metallic -->
    <linearGradient id="anvilGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="30%" stop-color="#E2E8F0"/>
      <stop offset="70%" stop-color="#CBD5E1"/>
      <stop offset="100%" stop-color="#94A3B8"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bgGradient)"/>

  <!-- Scale and center the logo -->
  <g transform="translate(56, 156) scale(2)">
    <!-- Left infinity loop -->
    <path
      d="M100 60
         C100 30, 55 20, 35 35
         C15 50, 15 70, 35 85
         C55 100, 100 90, 100 60"
      stroke="url(#gradientLeft)"
      stroke-width="14"
      stroke-linecap="round"
      fill="none"
      filter="url(#glow)"
    />

    <!-- Right infinity loop -->
    <path
      d="M100 60
         C100 30, 145 20, 165 35
         C185 50, 185 70, 165 85
         C145 100, 100 90, 100 60"
      stroke="url(#gradientRight)"
      stroke-width="14"
      stroke-linecap="round"
      fill="none"
      filter="url(#glow)"
    />

    <!-- Anvil -->
    <g filter="url(#glow)">
      <!-- Anvil top -->
      <path d="M80 45 L120 45 L125 50 L75 50 Z" fill="url(#anvilGradient)"/>
      <!-- Anvil horn -->
      <path d="M75 50 L65 52 L65 55 L75 55 Z" fill="url(#anvilGradient)"/>
      <!-- Anvil heel -->
      <path d="M125 50 L135 50 L135 58 L125 55 Z" fill="url(#anvilGradient)"/>
      <!-- Anvil body -->
      <path d="M75 50 L75 55 L85 60 L85 75 L115 75 L115 60 L125 55 L125 50 Z" fill="url(#anvilGradient)"/>
      <!-- Anvil base -->
      <path d="M82 75 L82 82 L78 85 L122 85 L118 82 L118 75 Z" fill="url(#anvilGradient)"/>
    </g>

    <!-- Shine -->
    <path d="M82 47 L118 47" stroke="white" stroke-width="1" opacity="0.6"/>
  </g>
</svg>
