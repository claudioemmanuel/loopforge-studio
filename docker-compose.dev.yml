# Development Docker Compose - Hybrid Development Setup
# ===========================================
#
# HYBRID MODE (Recommended for development):
#   Run infrastructure in Docker, web server locally for faster hot reload
#
#   1. Start infrastructure only:
#      docker compose -f docker-compose.dev.yml up -d postgres redis worker bull-board
#
#   2. Run migrations:
#      npm run db:migrate
#
#   3. Start web server locally:
#      npm run dev
#
# FULL DOCKER MODE:
#   Run everything in Docker (slower hot reload):
#
#   docker compose -f docker-compose.dev.yml up
#
# ===========================================

services:
  # ===========================================
  # PostgreSQL - Primary database (dev)
  # ===========================================
  postgres:
    image: postgres:16-alpine
    container_name: loopforge-studio-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: loopforge
    ports:
      - "5432:5432"
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d loopforge"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - loopforge-studio-dev

  # ===========================================
  # Redis - Job queue backend
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: loopforge-studio-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-dev-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - loopforge-studio-dev

  # ===========================================
  # Next.js Web Application (dev with hot reload)
  # ===========================================
  # NOTE: For hybrid development, run this locally instead:
  #   npm run dev
  #
  # Only start this service for full Docker development:
  #   docker compose -f docker-compose.dev.yml up
  # ===========================================
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        BUILDKIT_INLINE_CACHE: 1
    container_name: loopforge-studio-web-dev
    profiles:
      - full # Only starts with: docker compose --profile full up
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://loopforge:loopforge@postgres:5432/loopforge
      - REDIS_URL=redis://redis:6379
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - AUTH_TRUST_HOST=true
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=loopforge
    volumes:
      - .:/app
      - /app/.next
      - /app/node_modules # Exclude host node_modules - allows container to use Linux-native binaries
    command: npm run dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - loopforge-studio-dev

  # ===========================================
  # BullMQ Worker (dev with hot reload)
  # ===========================================
  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        BUILDKIT_INLINE_CACHE: 1
    container_name: loopforge-studio-worker-dev
    restart: unless-stopped
    ports:
      - "3001:3001" # Health endpoint port
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://loopforge:loopforge@postgres:5432/loopforge
      - REDIS_URL=redis://redis:6379
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=loopforge
      - NEXTAUTH_URL=http://web:3000
      - WORKER_SECRET=${WORKER_SECRET:-development-worker-secret}
      - HEALTH_PORT=3001
    volumes:
      - .:/app
      - repos-dev-data:/app/repos
      - /app/node_modules # Exclude host node_modules - allows container to use Linux-native binaries
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:3001/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - loopforge-studio-dev
    command: npx tsx --watch workers/execution-worker.ts

  # ===========================================
  # Bull Board - Job queue dashboard (optional)
  # ===========================================
  bull-board:
    image: deadly0/bull-board
    container_name: loopforge-bull-board-dev
    restart: unless-stopped
    ports:
      - "3002:3000" # Changed to 3002 to avoid conflict with worker's 3001
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_USE_TLS=false
      - BULL_PREFIX=bull
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - loopforge-studio-dev

volumes:
  postgres-dev-data:
    driver: local
  redis-dev-data:
    driver: local
  repos-dev-data:
    driver: local

networks:
  loopforge-studio-dev:
    driver: bridge
