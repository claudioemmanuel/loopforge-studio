# Development Docker Compose - Full stack with hot reload
# Usage: docker compose -f docker-compose.dev.yml up

services:
  # ===========================================
  # PostgreSQL - Primary database (dev)
  # ===========================================
  postgres:
    image: postgres:16-alpine
    container_name: loopforge-studio-postgres-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: loopforge
    ports:
      - "5432:5432"
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
      - ./scripts/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d loopforge"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - loopforge-studio-dev

  # ===========================================
  # Redis - Job queue backend
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: loopforge-studio-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis-dev-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - loopforge-studio-dev

  # ===========================================
  # Next.js Web Application (dev with hot reload)
  # ===========================================
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        BUILDKIT_INLINE_CACHE: 1
    container_name: loopforge-studio-web-dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/loopforge
      - REDIS_URL=redis://redis:6379
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - AUTH_TRUST_HOST=true
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - loopforge-studio-dev

  # ===========================================
  # BullMQ Worker (dev with hot reload)
  # ===========================================
  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        BUILDKIT_INLINE_CACHE: 1
    container_name: loopforge-studio-worker-dev
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/loopforge
      - REDIS_URL=redis://redis:6379
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    volumes:
      - .:/app
      - /app/node_modules
      - repos-dev-data:/app/repos
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - loopforge-studio-dev
    command: npx tsx --watch workers/execution-worker.ts

  # ===========================================
  # Bull Board - Job queue dashboard
  # ===========================================
  bull-board:
    image: deadly0/bull-board
    container_name: loopforge-bull-board-dev
    ports:
      - "3001:3000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_USE_TLS=false
      - BULL_PREFIX=bull
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - loopforge-studio-dev

volumes:
  postgres-dev-data:
    driver: local
  redis-dev-data:
    driver: local
  repos-dev-data:
    driver: local

networks:
  loopforge-studio-dev:
    driver: bridge
